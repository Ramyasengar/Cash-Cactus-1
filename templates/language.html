<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Language Selection</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #021c46;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 400px;
      background: #dcdada;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      text-align: center;
    }

    h1 {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #ff512f, #dd2476, #2575fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    p.subtitle {
      font-size: 14px;
      color: #333;
      margin-bottom: 20px;
    }

    .lang-btn {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      color: rgb(21, 20, 20);
      cursor: pointer;
      transition: 0.3s;
    }

    .lang-btn:hover {
      opacity: 0.9;
    }

    .english { background: linear-gradient(90deg, #7aa5ef, #b178ee); }
    .hindi { background: linear-gradient(90deg, #f98d77, #eb66a1); }
    .Hinglish { background: linear-gradient(90deg, #7ad6ef, #5ca1f6); }
    
    
  </style>
</head>
<body>
  <div class="container">
    <h1>Select Your Language</h1>
    <p class="subtitle">Please choose your preferred language</p>

    <button class="lang-btn english" onclick="selectLanguage('English')">English</button>
    <button class="lang-btn hindi" onclick="selectLanguage('Hindi')">हिंदी</button>
    <button class="lang-btn Hinglish" onclick="selectLanguage('Hinglish')">Hinglish</button>
    
  </div>

  <script>
    function selectLanguage(lang) {
      alert("You selected " + lang);
      // Example: Redirect to login.html if English selected
      // if(lang === "English") window.location.href = "login.html";
    }
  </script>
</body>
</html>
