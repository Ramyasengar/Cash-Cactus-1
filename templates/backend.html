### frontend/index.html

```html
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Income & Saving Planner</title>
  <style>
    /* Clean modern styling */
    body{font-family:Inter,system-ui,Arial;margin:20px;background:#f3f6fb}
    .container{max-width:980px;margin:0 auto;background:#fff;padding:18px;border-radius:12px;box-shadow:0 6px 20px rgba(10,20,50,0.06)}
    h1{margin:0 0 10px}
    label{display:block;margin-top:10px;font-weight:600}
    input,select{width:100%;padding:8px;border-radius:8px;border:1px solid #e6eef7;margin-top:6px}
    .row{display:flex;gap:14px}
    .col{flex:1}
    .tabs{display:flex;gap:10px;margin-top:10px}
    .tab{padding:8px 12px;border-radius:8px;cursor:pointer;border:1px solid transparent}
    .tab.active{background:#6d28d9;color:white}
    .btn{margin-top:12px;padding:10px 14px;border-radius:10px;border:none;background:#0ea5e9;color:white;cursor:pointer}
    .note{color:#334155;margin-top:8px;font-size:14px}
    .charts{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px}
    canvas{background:transparent}
    ul{padding-left:16px}
    @media(max-width:860px){.row{flex-direction:column}}
  </style>
</head>
<body>
  <div class="container">
    <div id="app"></div>
  </div>

  <!-- React + ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    const { useState, useRef, useEffect } = React;

    function App(){
      const [income,setIncome] = useState('');
      const [age,setAge] = useState(18);
      const [saveTab,setSaveTab] = useState('percentage');
      const [savePerc,setSavePerc] = useState(10);
      const [result,setResult] = useState(null);
      const [error,setError] = useState('');

      const defaultPerc = { dailyUsage:30, foodAndRent:30, medical:10, educational:5, additional:15, emi:10 };
      const [customPerc,setCustomPerc] = useState(defaultPerc);

      const expensesRef = useRef(null);
      const savingsRef = useRef(null);
      const expensesChart = useRef(null);
      const savingsChart = useRef(null);

      useEffect(()=>{ return ()=>{ if(expensesChart.current) expensesChart.current.destroy(); if(savingsChart.current) savingsChart.current.destroy(); } },[]);

      function pretty(k){ return {dailyUsage:'Daily Usage',foodAndRent:'Food & Rent',medical:'Medical',educational:'Educational',additional:'Additional',emi:'EMI'}[k] || k }

      function validateInputs(){
        const inc = Number(income);
        if(!inc || inc <= 0) return 'Enter valid monthly income';
        if(Number(age) < 0) return 'Enter valid age';
        if(saveTab === 'percentage' && (Number(savePerc) < 0 || Number(savePerc) >= 100)) return 'Enter valid save % (0-99)';
        return null;
      }

      function handleCalculate(){
        setError('');
        const v = validateInputs();
        if(v){ setError(v); return; }

        const payload = { income: Number(income), age: Number(age), saveOption: saveTab, savePercentage: saveTab==='percentage'?Number(savePerc):0 };

        fetch('http://localhost:3000/api/calculate',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) })
          .then(r=>r.json())
          .then(data=>{
            if(data.error){ setError(data.error); return; }

            // If user selected percentage and wants custom distribution, normalize customPerc and apply to remaining
            if(saveTab === 'percentage'){
              const allowEmi = Number(age) >= 18;
              const perc = { ...customPerc };
              if(!allowEmi){ perc.additional += (perc.emi||0); perc.emi = 0; }

              const total = Object.values(perc).reduce((a,b)=>a+Number(b),0) || 1;
              const normalized = {};
              Object.keys(perc).forEach(k=> normalized[k] = (Number(perc[k])/total)*100 );

              const remaining = data.remaining;
              const breakdown = {};
              let sum = 0;
              Object.keys(normalized).forEach(k=>{
                const amt = +((remaining * normalized[k]) / 100).toFixed(2);
                breakdown[k] = { percent: +normalized[k].toFixed(2), amount: amt };
                sum += amt;
              });
              const diff = +(remaining - sum).toFixed(2);
              if(Math.abs(diff) >= 0.01) breakdown.additional.amount = +((breakdown.additional.amount||0)+diff).toFixed(2);

              const final = { ...data, breakdown };
              setResult(final); renderCharts(final);
            } else {
              setResult(data); renderCharts(data);
            }
          })
          .catch(()=> setError('Cannot reach backend. Make sure backend is running on http://localhost:3000'));
      }

      function renderCharts(data){
        const labels = []; const values = [];
        Object.entries(data.breakdown).forEach(([k,v])=>{ if(v.amount>0){ labels.push(pretty(k)); values.push(v.amount); }});

        if(expensesChart.current) expensesChart.current.destroy();
        expensesChart.current = new Chart(expensesRef.current, { type:'pie', data:{ labels, datasets:[{ data: values }] }, options:{ responsive:true, plugins:{ title:{display:true,text:'Expenses Breakdown'} } } });

        if(savingsChart.current) savingsChart.current.destroy();
        const savings = data.savings || 0;
        const expensesSum = Object.values(data.breakdown).reduce((a,b)=>a+b.amount,0);
        savingsChart.current = new Chart(savingsRef.current, { type:'pie', data:{ labels:['Savings','Expenses'], datasets:[{ data:[savings, expensesSum] }] }, options:{ responsive:true, plugins:{ title:{display:true,text:'Savings vs Expenses'} } } });
      }

      function updateCustom(k,v){ setCustomPerc(prev=>({ ...prev, [k]: Number(v) })); }

      return (
        React.createElement('div', null,
          React.createElement('h1', null, 'Income & Saving Planner'),
          React.createElement('div', { className:'row' },
            React.createElement('div', { className:'col' },
              React.createElement('label', null, 'Monthly Income (₹) *'),
              React.createElement('input', { type:'number', value:income, onChange:e=>setIncome(e.target.value), placeholder:'Enter monthly income' }),

              React.createElement('label', null, 'Age *'),
              React.createElement('input', { type:'number', value:age, onChange:e=>setAge(e.target.value), min:0 }),

              React.createElement('div', { className:'tabs' },
                React.createElement('div', { className:`tab ${saveTab==='percentage'?'active':''}`, onClick:()=>setSaveTab('percentage') }, 'Percentage Saving'),
                React.createElement('div', { className:`tab ${saveTab==='none'?'active':''}`, onClick:()=>setSaveTab('none') }, 'None')
              ),

              saveTab==='percentage' && React.createElement('div', null,
                React.createElement('label', null, `Save % of income: ${savePerc}%`),
                React.createElement('input', { type:'range', min:0, max:90, value:savePerc, onChange:e=>setSavePerc(e.target.value) }),
                React.createElement('div', { className:'note' }, 'Adjust category percentages (EMI hidden for age < 18):'),
                Object.keys(customPerc).map(k=>{
                  if(k==='emi' && Number(age) < 18) return null;
                  return React.createElement('div', { key:k },
                    React.createElement('label', null, pretty(k)+ ' (%)'),
                    React.createElement('input', { type:'number', value:customPerc[k], min:0, max:100, onChange:e=>updateCustom(k,e.target.value) })
                  );
                })
              ),

              saveTab==='none' && React.createElement('div', null, React.createElement('div', { className:'note' }, 'No saving selected — entire income will be auto-distributed.')),

              React.createElement('button', { className:'btn', onClick:handleCalculate }, 'Generate Plan')
            ),

            React.createElement('div', { className:'col' },
              React.createElement('h3', null, 'Result'),
              error && React.createElement('div', { style:{color:'crimson'} }, error),
              result ? React.createElement('div', null,
                React.createElement('p', null, `Monthly Income: ₹${result.income}`),
                React.createElement('p', null, `Savings (${result.savePercentage}%): ₹${result.savings}`),
                React.createElement('p', null, `Remaining for expenses: ₹${result.remaining}`),
                React.createElement('div', { className:'charts' },
                  React.createElement('div', { style:{width:360} }, React.createElement('canvas', { ref:expensesRef })),
                  React.createElement('div', { style:{width:360} }, React.createElement('canvas', { ref:savingsRef }))
                ),
                React.createElement('div', null,
                  React.createElement('h4', null, 'Breakdown'),
                  React.createElement('ul', null, Object.entries(result.breakdown).map(([k,v])=> React.createElement('li',{key:k}, `${pretty(k)}: ₹${v.amount} (${v.percent}%)`)))
                )
              ) : React.createElement('div', { className:'note' }, 'Results will appear here after generating plan.')
            )
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(React.createElement(App));
  </script>
</body>
</html>
