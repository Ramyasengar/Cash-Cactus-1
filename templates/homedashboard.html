<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Expense Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#011b47,#05327e);
  padding:20px;
}
.page{
  max-width:900px;
  margin:auto;
  background:#fff;
  padding:25px;
  border-radius:12px;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
  display:none;
}
.page.active{display:block}

h2{text-align:center;color:#2575fc}

/* vertical layout */
.form-column{
  display:flex;
  flex-direction:column;
  gap:15px;
  margin-bottom:20px;
}

label{
  font-weight:bold;
  margin-bottom:5px;
}

input,select{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.btn-row{
  display:flex;
  justify-content:flex-end;
}

.btn{
  padding:12px 30px;
  border:none;
  border-radius:8px;
  background:linear-gradient(90deg,#2575fc,#5fc3e4);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.chart-row{
  display:flex;
  gap:30px;
  margin-top:20px;
}

.chart-box{flex:1}

.weekly-section{display:none}

.option-links{
  margin-top:30px;
  text-align:center;
}

.option-links p{
  font-weight:bold;
  margin-bottom:12px;
}

.option-links span{
  display:block;
  color:#2575fc;
  cursor:pointer;
  margin:8px 0;
  font-weight:bold;
}
.option-links span:hover{text-decoration:underline}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page active" id="page1">
  <h2>User Details</h2>

  <div class="form-column">
    <div>
      <label>Category</label>
      <select id="userCategory">
        <option value="">Select</option>
        <option value="housewife">Housewife</option>
        <option value="working">Working</option>
        <option value="student">Student</option>
      </select>
    </div>

    <div>
      <label>Monthly Income (₹)</label>
      <input type="number" id="income">
    </div>

    <div>
      <label>Saving</label>
      <select id="savingChoice" onchange="toggleSaving()">
        <option value="no">No</option>
        <option value="yes">Yes</option>
      </select>
    </div>

    <div id="savingPercentBox" style="display:none;">
      <label>Saving %</label>
      <input type="number" id="savingPercent">
    </div>
  </div>

  <div class="btn-row">
    <button class="btn" onclick="goToPage2()">Next</button>
  </div>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
  <h2>Monthly Expenditure</h2>

  <div class="form-column">
    <div><label>Food / Rent</label><input type="number" id="food"></div>
    <div><label>Education</label><input type="number" id="education"></div>
    <div><label>Medical</label><input type="number" id="medical"></div>
    <div><label>Additional</label><input type="number" id="additional"></div>
    <div id="emiBox"><label>EMI</label><input type="number" id="emi"></div>
  </div>

  <div class="btn-row">
    <button class="btn" onclick="goToPage3()">Next</button>
  </div>
</div>

<!-- PAGE 3 -->
<div class="page" id="page3">
  <h2>Monthly Expense Comparison</h2>

  <div class="chart-row">
    <div class="chart-box"><canvas id="userChart"></canvas></div>
    <div class="chart-box"><canvas id="aiChart"></canvas></div>
  </div>

  <div style="margin-top:20px">
    <label><input type="radio" name="weekly" onclick="showWeekly(true)"> Show Weekly Graph</label>
    <label style="margin-left:15px"><input type="radio" name="weekly" checked onclick="showWeekly(false)"> Hide Weekly</label>
  </div>

  <div class="chart-row weekly-section" id="weeklySection">
    <div class="chart-box"><canvas id="userWeekly"></canvas></div>
    <div class="chart-box"><canvas id="aiWeekly"></canvas></div>
  </div>

  <!-- OPTIONS -->
  <div class="option-links">
    <p>With which option u want to proceed further?</p>
    <span onclick="alert('Proceeding with your plan')">Proceed with my plan</span>
    <span onclick="alert('Proceeding with AI plan')">Proceed with AI plan</span>
    <span onclick="location.reload()">Modify my expenses</span>
  </div>
</div>

<script>
let userChart, aiChart, userWeeklyChart, aiWeeklyChart;

function toggleSaving(){
  savingPercentBox.style.display =
  savingChoice.value==="yes" ? "block" : "none";
}

function goToPage2(){
  page1.classList.remove("active");
  page2.classList.add("active");
  if(userCategory.value==="student") emiBox.style.display="none";
}

function calculateRemaining(){
  const incomeVal=+income.value||0;
  const savingVal=incomeVal*(+savingPercent.value||0)/100;
  const totalExpense=(+food.value||0)+(+education.value||0)+(+medical.value||0)+(+additional.value||0)+(+emi.value||0)+savingVal;
  return incomeVal-totalExpense;
}

function goToPage3(){
  page2.classList.remove("active");
  page3.classList.add("active");

  const labels=["Food","Education","Medical","Additional","EMI","Saving","Remaining"];

  const saving=income.value*(savingPercent.value||0)/100;
  const remaining=calculateRemaining();

  const userData=[
    food.value,education.value,medical.value,additional.value,emi.value,saving,remaining
  ];

  const aiData=userData.map(v=>v*0.9);

  userChart=new Chart(userChartCanvas,{
    type:"bar",
    data:{labels,datasets:[{label:"User Monthly",data:userData,backgroundColor:"#2575fc"}]}
  });

  aiChart=new Chart(aiChartCanvas,{
    type:"bar",
    data:{labels,datasets:[{label:"AI Monthly",data:aiData,backgroundColor:"#ff6b6b"}]}
  });
}

function showWeekly(show){
  weeklySection.style.display=show?"flex":"none";
  if(show && !userWeeklyChart){
    const labels=["Food","Education","Medical","Additional","EMI","Saving","Remaining"];
    const remaining=calculateRemaining()/4;

    const userWeeklyData=[
      food.value/4,education.value/4,medical.value/4,additional.value/4,emi.value/4,
      (income.value*(savingPercent.value||0)/100)/4,remaining
    ];

    const aiWeeklyData=userWeeklyData.map(v=>v*0.9);

    userWeeklyChart=new Chart(userWeekly,{
      type:"bar",
      data:{labels,datasets:[{label:"User Weekly",data:userWeeklyData,backgroundColor:"#2575fc"}]}
    });

    aiWeeklyChart=new Chart(aiWeekly,{
      type:"bar",
      data:{labels,datasets:[{label:"AI Weekly",data:aiWeeklyData,backgroundColor:"#ff6b6b"}]}
    });
  }
}

const userChartCanvas=document.getElementById("userChart");
const aiChartCanvas=document.getElementById("aiChart");
</script>

</body>
</html>
