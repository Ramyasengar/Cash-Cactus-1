<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Profile</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #022c34, #043f4a);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  width: 420px;
  background: #fff;
  padding: 30px;
  border-radius: 12px;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

label {
  font-weight: bold;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0 15px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.btn {
  width: 100%;
  padding: 12px;
  background: #2575fc;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.error {
  color: red;
  text-align: center;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h2>Edit Profile</h2>

  {% if error %}
    <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST">

    <label>Name</label>
    <input type="text" name="name" value="{{ user.name }}" required>

    <label>Mobile</label>
    <input type="text"
           name="mobile"
           value="{{ user.mobile }}"
           maxlength="10"
           oninput="this.value=this.value.replace(/[^0-9]/g,'')"
           required>

    <label>Email</label>
    <input type="email"
           name="email"
           value="{{ user.email }}"
           pattern="^[a-zA-Z0-9._%+-]+@gmail\.com$"
           required>

    <button class="btn">Update Profile</button>
  </form>
</div>

</body>
</html>
