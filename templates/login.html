<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #011b47, #05327e);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 450px;
      background: #d4d3d3;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      font-size: 40px;
      margin-bottom: 25px;
      background: linear-gradient(90deg, #ff512f, #dd2476, #2575fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(90deg, #ff512f, #dd2476, #2575fc);
      color: white;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .error {
      color: red;
      text-align: center;
      margin-bottom: 10px;
    }

    .login-link {
      text-align: center;
      margin-top: 15px;
    }

    .login-link a {
      color: #2575fc;
      font-weight: bold;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Login</h1>

    <form method="POST" action="{{ url_for('login') }}">

      <label>Email *</label>
      <input type="email" name="email" required>

      <label>Password *</label>
      <input type="password" name="password" required>

      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}

      <button type="submit" class="btn">Login</button>

      <div class="login-link">
        Not registered? <a href="{{ url_for('register') }}">Register here</a>
      </div>

      <div class="login-link">
        <a href="{{ url_for('index') }}">Back to Landing Page</a>
      </div>

    </form>
  </div>

</body>
</html>
